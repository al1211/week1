<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
  .question {
    margin-bottom: 20px;
  }
</style>
<body>

<div class="container">
  <h1>Quiz App</h1>

<div id="quiz">
  <h2 id="question">Question</h2>

  <label><input type="radio" name="answer" value="a"> <span id="a"></span></label><br>
  <label><input type="radio" name="answer" value="b"> <span id="b"></span></label><br>
  <label><input type="radio" name="answer" value="c"> <span id="c"></span></label><br>
  <label><input type="radio" name="answer" value="d"> <span id="d"></span></label><br>

  <button id="submit">Next</button>
</div>

  <button id="submitBtn">Submit</button>

  <div id="result"></div>
</div>

<script src="data.js"></script>
</body>
</html>
