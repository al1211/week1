<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form builder</title>
</head>
<style>
    body {
      font-family: Arial;
      display: flex;
      gap: 30px;
      padding: 20px;
    }

    .builder, .preview {
      width: 50%;
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .field {
      margin-bottom: 15px;
    }

    input[type="text"] {
      padding: 5px;
      width: 100%;
    }
  </style>
<body>
     
   <div class="builder">
    <h2>Form Builder</h2>

    <input type="text" id="labelInput" placeholder="Enter field label" />

    <br><br>

    <button onclick="addField('text')">Add Text Input</button>
    <button onclick="addField('checkbox')">Add Checkbox</button>
    <button onclick="addField('radio')">Add Radio</button>
    <button onclick="addField('password')">Password</button>
    <button onclick="addField('number')">Number</button>
  </div>
  <div class="preview">
    <h2>Preview</h2>
    <form id="formPreview"></form>
  </div>

  <script>
    let formFields = [];

    function addField(type) {
      const label = document.getElementById("labelInput").value;

      if (!label) {
        alert("Please enter a label!");
        return;
      }

      const field = {
        type: type,
        label: label,
        name: "field_" + Date.now()
      };

      formFields.push(field);
      document.getElementById("labelInput").value = "";

      renderForm();
    }

    function renderForm() {
      const form = document.getElementById("formPreview");
      form.innerHTML = "";

      formFields.forEach(field => {
        const div = document.createElement("div");
        div.className = "field";

        const label = document.createElement("label");
        label.innerText = field.label;

        div.appendChild(label);
        div.appendChild(document.createElement("br"));

        if (field.type === "text") {
          const input = document.createElement("input");
          input.type = "text";
          div.appendChild(input);
        }

        if (field.type === "checkbox") {
          const input = document.createElement("input");
          input.type = "checkbox";
          div.appendChild(input);
        }

        if (field.type === "radio") {
          const input = document.createElement("input");
          input.type = "radio";
          input.name = field.name;
          div.appendChild(input);
        }
        if(field.type==="password"){
            const input= document.createElement("input");
            input.type="password";
            input.name=field.name;
            div.appendChild(input)
        }
        if(field.type==="number"){
            const input=document.createElement("input");
            input.type="number";
            input.name=field.name;
            div.appendChild(input)
        }

        form.appendChild(div);
      });
    }
  </script>
</body>
</html>
